<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Shop Online</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    direction: rtl;
    background: #f3f3f3;
}

header {
    background: #131921;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #232f3e;
}

.topbar input {
    width: 70%;
    padding: 8px;
}

.cart-btn {
    background: orange;
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
}

.container {
    padding: 15px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
    gap: 15px;
}

.product {
    background: white;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
}

.btn {
    background: #ff9900;
    padding: 8px;
    display: block;
    margin-top: 8px;
    text-decoration: none;
    color: black;
    border-radius: 5px;
    cursor: pointer;
}

.cart {
    position: fixed;
    top: 0;
    right: -100%;
    width: 300px;
    height: 100%;
    background: white;
    padding: 15px;
    transition: 0.3s;
    overflow-y: auto;
}

.cart.active {
    right: 0;
}

footer {
    background: #131921;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header>Mega Shop Online 🛍️</header>

<div class="topbar">
<input type="text" id="search" placeholder="ابحث..." onkeyup="searchProducts()">
<div class="cart-btn" onclick="toggleCart()">🛒 السلة (<span id="count">0</span>)</div>
</div>

<div class="container">
<div class="products" id="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>تيشيرت</h3>
<p>199</p>
<button class="btn" onclick="addToCart('تيشيرت',199)">أضف للسلة</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>سماعات</h3>
<p>299</p>
<button class="btn" onclick="addToCart('سماعات',299)">أضف للسلة</button>
</div>

</div>
</div>

<!-- السلة -->
<div class="cart" id="cart">
<h2>سلة المشتريات</h2>
<div id="cart-items"></div>
<h3 id="total">الإجمالي: 0</h3>
<button class="btn" onclick="orderWhatsApp()">اطلب عبر واتساب</button>
</div>

<footer>© 2026 Mega Shop</footer>

<script>
let cart = [];

function addToCart(name, price){
    cart.push({name, price});
    updateCart();
}

function updateCart(){
    let items = document.getElementById("cart-items");
    let total = 0;
    items.innerHTML = "";

    cart.forEach(item=>{
        items.innerHTML += `<p>${item.name} - ${item.price} جنيه</p>`;
        total += item.price;
    });

    document.getElementById("total").innerText = "الإجمالي: " + total;
    document.getElementById("count").innerText = cart.length;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("active");
}

function orderWhatsApp(){
    let message = "طلب جديد:%0A";
    cart.forEach(item=>{
        message += item.name + " - " + item.price + " جنيه%0A";
    });

    window.open("https://wa.me/201XXXXXXXXX?text=" + message);
}

function searchProducts(){
    let input = document.getElementById("search").value.toLowerCase();
    let products = document.getElementsByClassName("product");

    for (let i = 0; i < products.length; i++) {
        let title = products[i].getElementsByTagName("h3")[0].innerText.toLowerCase();

        products[i].style.display = title.includes(input) ? "block" : "none";
    }
}
</script>

</body>
</html>
